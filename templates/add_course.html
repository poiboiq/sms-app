{% extends 'base.html' %}
{% block title %}Add Course - SMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Add Course</h1>
    <a href="/courses" class="btn btn-secondary">← Back</a>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Course Name *</label>
            <input type="text" name="name" required placeholder="e.g. DevOps for Cloud Computing">
        </div>
        <div class="form-group">
            <label>Course Code *</label>
            <input type="text" name="code" required placeholder="e.g. CSC413">
        </div>
        <div class="form-group">
            <label>Credits</label>
            <select name="credits">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
            </select>
        </div>
        <div class="form-group">
            <label>Instructor</label>
            <input type="text" name="instructor" placeholder="e.g. Dr. Ahmad">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Course</button>
            <a href="/courses" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
