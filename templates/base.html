<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management System{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --card: #1a1a24;
            --border: #2a2a3a;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --accent3: #43e97b;
            --text: #e8e8f0;
            --muted: #8888a8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }
        /* NAV */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-brand span { color: var(--accent); }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text);
            background: var(--card);
        }
        .nav-links a.active { color: var(--accent); }
        /* MAIN */
        main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        /* FLASH */
        .flash {
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .flash.success { background: rgba(67,233,123,0.1); border: 1px solid rgba(67,233,123,0.3); color: var(--accent3); }
        .flash.error { background: rgba(255,101,132,0.1); border: 1px solid rgba(255,101,132,0.3); color: var(--accent2); }
        /* PAGE HEADER */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
        }
        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #5a52e0; transform: translateY(-1px); }
        .btn-danger { background: rgba(255,101,132,0.15); color: var(--accent2); border: 1px solid rgba(255,101,132,0.3); }
        .btn-danger:hover { background: rgba(255,101,132,0.25); }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        /* TABLE */
        .table-wrap { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--surface); }
        th { padding: 14px 20px; text-align: left; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
        td { padding: 14px 20px; border-top: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover td { background: rgba(108,99,255,0.04); }
        /* BADGE */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-purple { background: rgba(108,99,255,0.15); color: var(--accent); }
        .badge-green { background: rgba(67,233,123,0.15); color: var(--accent3); }
        /* FORM */
        .form-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 2rem; max-width: 580px; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
        input, select {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        select option { background: var(--surface); }
        .form-actions { display: flex; gap: 12px; margin-top: 1.5rem; }
        /* STATS CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-bottom: 2.5rem; }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .stat-card.s1::before { background: var(--accent); }
        .stat-card.s2::before { background: var(--accent2); }
        .stat-card.s3::before { background: var(--accent3); }
        .stat-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
        .stat-value { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; }
        .stat-card.s1 .stat-value { color: var(--accent); }
        .stat-card.s2 .stat-value { color: var(--accent2); }
        .stat-card.s3 .stat-value { color: var(--accent3); }
        /* EMPTY STATE */
        .empty { text-align: center; padding: 3rem; color: var(--muted); }
        .empty h3 { font-family: 'Syne', sans-serif; margin-bottom: 8px; color: var(--text); }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-brand">🎓 <span>SMS</span> &nbsp;Student Portal</a>
    <div class="nav-links">
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
        <a href="/students" {% if '/students' in request.path %}class="active"{% endif %}>Students</a>
        <a href="/courses" {% if '/courses' in request.path %}class="active"{% endif %}>Courses</a>
        <a href="/enrollments" {% if '/enrollments' in request.path %}class="active"{% endif %}>Enrollments</a>
    </div>
</nav>
<main>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
                <div class="flash {{ cat }}">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
