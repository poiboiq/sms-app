{% extends 'base.html' %}
{% block title %}Edit Student - SMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Student</h1>
    <a href="/students" class="btn btn-secondary">← Back</a>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" required value="{{ student.name }}">
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required value="{{ student.email }}">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ student.phone }}">
        </div>
        <div class="form-group">
            <label>Department</label>
            <select name="department">
                {% for dept in ['Computer Science','Software Engineering','Artificial Intelligence','Data Science','Cyber Security'] %}
                <option value="{{ dept }}" {% if student.department == dept %}selected{% endif %}>{{ dept }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/students" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
