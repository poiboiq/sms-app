{% extends 'base.html' %}
{% block title %}Add Student - SMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Add Student</h1>
    <a href="/students" class="btn btn-secondary">← Back</a>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" required placeholder="e.g. Ali Hassan">
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required placeholder="e.g. ali@example.com">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" placeholder="e.g. 0300-1234567">
        </div>
        <div class="form-group">
            <label>Department</label>
            <select name="department">
                <option value="Computer Science">Computer Science</option>
                <option value="Software Engineering">Software Engineering</option>
                <option value="Artificial Intelligence">Artificial Intelligence</option>
                <option value="Data Science">Data Science</option>
                <option value="Cyber Security">Cyber Security</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Student</button>
            <a href="/students" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
